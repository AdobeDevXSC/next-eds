name = "next-eds-rebuild"
main = "worker.js"
compatibility_date = "2025-03-25"

# Rebuild cadence. Cron is in UTC. Every 15 minutes here; tighten or loosen to taste.
# (This is the freshness window for published content — see rebuild/README.md.)
[triggers]
crons = ["*/15 * * * *"]

# DEPLOY_HOOK_URL and TRIGGER_TOKEN are secrets — set with `npx wrangler secret put …`,
# never put them in this file.
